<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div{
    width: auto;
    height: 500px;
    display: block;
    position: absolute;
    left: 30%;
    
}
button{
    font-size: 20px;
    position: absolute;
    top: 10%;
    left: 0%;
}
    </style>
</head>
<body>
    <div class="div">
    <input type="checkbox" id="mycheckbox">
    <label for="checkbox">Rohan Adhikari</label><br>
    <input type="radio" id="studing" name="card">
    <label for="studing">Are you Focusing on your coding?</label>
    <input type="radio" id="Gym" name="card">
    <label for="Gym">Are you Focusing on your Gym?</label>
    <input type="radio" id="Sports" name="card">
    <label for="Sports">Are you Focusing on your Sports?</label>
    <button type="Submit" id="mysubmit">Submit</button><br><br><br><br>
    <p id="rohan"></p><br><br><br><br>
    <p id="submitresponse"></p>
    </div>
    <script>
        const MyCheckBox = document.getElementById("mycheckbox");
const MyStudyBox = document.getElementById("studing");
const MyGymBox = document.getElementById("Gym");
const MySportsBox = document.getElementById("Sports");
const MySubmit = document.getElementById("mysubmit");
const Rohan = document.getElementById("rohan");
const submitres = document.getElementById("submitresponse");

MySubmit.onclick = function(){

    if(MyCheckBox.checked){
        Rohan.textContent = `Welcome Mr. Rohan!`;
        if(MyStudyBox.checked){
            submitres.textContent = `Good. But Focus On Gym and Sports too`;
        }
        else if(MyGymBox.checked){
            submitres.textContent = `Good. But Focus on Study and Sports too`;
        }
        else if(MySportsBox.checked){
            submitres.textContent = `Good. But Focus on Study and Gym too`;
        }
        else{
            submitres.textContent = `Focus on Your Goals.`;
        }
        }
    else{
        Rohan.textContent = `This Response can be only submit by Rohan`;
        }   
}
    </script>
</body>
</html>
