<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Filter and Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div id="search_container">
            <input type="search" id="search-input" placeholder="Search Product Name here...">
            <button id="search">Search</button>
        </div>
        <div class="buttons">
            <buttons class="button_values">All</buttons>
            <buttons class="button_values">Mercedes</buttons>
            <buttons class="button_values">Jaguar</buttons>
            <buttons class="button_values">Rolls Royce</buttons>
            <buttons class="button_values">Jeep</buttons>
        </div>
        <div id="products"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
